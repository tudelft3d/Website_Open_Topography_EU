name: website update

on: 
  push:
    branches: 
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: trigger update
        run: |
          curl --fail -s -L --no-buffer ${{ secrets.UPDATE_URL }} | tee /tmp/update_response.txt
          if grep -qi "killed" /tmp/update_response.txt; then
            echo "Error: response contains 'killed' — process was likely terminated"
            exit 1
          fi
