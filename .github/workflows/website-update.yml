name: website update

on: 
  push:
    branches: 
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: trigger update
        run: |
          response=$(curl --fail -L ${{ secrets.UPDATE_URL }})
          echo "$response"
          if echo "$response" | grep -qi "killed"; then
            echo "Error: response contains 'killed' — process was likely terminated"
            exit 1
          fi
