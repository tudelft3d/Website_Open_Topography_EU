<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>OpenEUTopography</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Kaartbibliotheek en lettertype -->
  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet"/>
  <style>
    html, body { height:100%; margin:0; font-family:'Roboto',sans-serif; background:#cce6ff; }
    body.loading #map, body.loading #top-controls, body.loading #logo-bar { visibility:hidden; }
    #loader { position:fixed; top:0; left:0; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; background:#fff; z-index:3000; font-size:1.2em; }
    #map { position:absolute; top:0; bottom:0; width:100%; }
    #sidebar { position:fixed; top:0; right:0; width:320px; height:100%; background:#f8f9fa; padding:16px; box-shadow:-2px 0 5px rgba(0,0,0,0.2); overflow-y:auto; transform:translateX(100%); transition:transform .3s ease; z-index:1000; }
    #sidebar.visible { transform:translateX(0); }
    #closeBtn { position:absolute; top:8px; right:8px; background:none; border:none; font-size:24px; cursor:pointer; }
    #logo-bar { position:fixed; bottom:12px; left:12px; display:flex; gap:10px; background:rgba(255,255,255,0.85); padding:6px 10px; border-radius:6px; box-shadow:0 0 4px rgba(0,0,0,0.15); z-index:1001; }
    #logo-bar img { height:32px; max-width:100px; cursor:pointer; }
    #info h4 { color:#003399; font-size:1.1em; margin-top:20px; }
    #info ul { padding-left:20px; margin-bottom:16px; }
    #info li { margin-bottom:6px; }
    #introModal { position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:2000; }
    #introModal.visible { display:flex; }
    #introModalContent { background:#fff; padding:24px; max-width:500px; border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,0.2); text-align:left; }
    #introBtn { display:none; pointer-events:none; margin-top:16px; float:right; padding:6px 12px; font-size:14px; }
    #top-controls { position:fixed; top:12px; left:12px; z-index:1002; background:rgba(50,50,50,0.8); padding:12px; border-radius:6px; color:white; width:260px; display:flex; flex-direction:column; gap:6px; }
    #countrySelect { width:100%; padding:6px; border:none; border-radius:4px; background:#fff; color:#333; }
    #optionList { display:none; flex-direction:column; gap:6px; }
    .option-btn { background:#fff; color:#333; border:1px solid #333; padding:6px 12px; border-radius:4px; cursor:pointer; text-align:left; }
    .option-btn:hover { background:#e0e0e0; }
    #usageInstructions { font-size:13px; text-align:center; }
  </style>
</head>
<body class="loading">
  <div id="loader">Loading…</div>
  <div id="introModal">
    <div id="introModalContent">
      <h3>Welcome to the European Topography Elevation Searcher</h3>
      <p>Selecteer een land uit de lijst om te starten.</p>
      <button id="introBtn" onclick="toggleIntro()" disabled>Got it</button>
    </div>
  </div>
  <div id="top-controls">
    <select id="countrySelect"></select>
    <div id="optionList"></div>
    <div id="usageInstructions">Selecteer een land om datasetinformatie te zien.</div>
  </div>
  <div id="map"></div>
  <div id="sidebar">
    <button id="closeBtn">&times;</button>
    <h2>Information</h2>
    <div id="info">Selecteer eerst een land.</div>
  </div>
  <div id="logo-bar">
    <a href="https://www.tudelft.nl/en/" target="_blank"><img src="images/logo_tudelft.png" alt="TU Delft"/></a>
    <a href="https://www.eurosdr.net/" target="_blank"><img src="images/logo_eurosdr.png" alt="EuroSDR"/></a>
    <a href="https://www.rijkswaterstaat.nl/" target="_blank"><img src="images/logo_rws.png" alt="Rijkswaterstaat"/></a>
  </div>
  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script>
    // Dataopslag en timer variabelen
    let countriesData = null;
    let regionsData = null;
    let textTemplates = {};
    let timer;

    // Toon of verberg intro modal
    function toggleIntro() {
      document.getElementById('introModal').classList.toggle('visible');
    }

    // Sidebar referenties
    const sidebar = document.getElementById('sidebar');
    const infoBox = document.getElementById('info');
    const closeBtn = document.getElementById('closeBtn');
    closeBtn.onclick = () => resetToCountries();

    // Replaces template placeholders
    function injectData(template, props) {
      return template
        .replace(/{{type}}/g, props.Type || 'N/A')
        .replace(/{{national}}/g, props.National || 'N/A')
        .replace(/{{urban}}/g, props.Urban || 'N/A')
        .replace(/{{avg_dens}}/g, props.Avg_dens || 'N/A')
        .replace(/{{planimetric}}/g, props.Planimetric || 'N/A')
        .replace(/{{altimetric}}/g, props.Altimetric || 'N/A')
        .replace(/{{year}}/g, props.Year || 'N/A')
        .replace(/{{climate}}/g, props.Climate || 'N/A')
        .replace(/{{link}}/g, props.Link || '#');
    }

    // Show dataset info
    function showInfo(props, _, regionMode = false) {
      const title = regionMode ? props.RegionName : props.Name;
      const base = textTemplates[title] || '';
      const mainText = base ? `<p>${injectData(base, props)}</p>` : '<p>No info available.</p>';
      const dataHtml = `<h4>Datasets:</h4><p>${props.Data || 'N/A'}</p>`;
      infoBox.innerHTML = `<h3>${title}</h3>${mainText}${dataHtml}`;
      sidebar.classList.add('visible');
    }

    // Reset map view
    function resetToCountries() {
      const backBtn = document.getElementById('backBtn');
      if (backBtn) backBtn.remove();
      // Remove region layers
      if (map.getLayer('region-fill')) map.removeLayer('region-fill');
      if (map.getLayer('region-border')) map.removeLayer('region-border');
      if (map.getSource('regions')) map.removeSource('regions');
      regionsData = null;
      // Reset map style
      map.setPaintProperty('osm', 'raster-opacity', 1);
      map.setLayoutProperty('country-fill', 'visibility', 'visible');
      map.setLayoutProperty('country-border', 'visibility', 'visible');
      map.setPaintProperty('country-fill', 'fill-opacity', 0.4);
      // Hide option buttons, show dropdown
      document.getElementById('optionList').style.display = 'none';
      document.getElementById('countrySelect').style.display = 'block';
      map.easeTo({ center: [5,50], zoom:5, pitch:0, bearing:0, duration:1000 });
      sidebar.classList.remove('visible');
    }

    // Handle country selection (from map or dropdown)
    function handleCountrySelect(feature) {
      const props = feature.properties;
      const bbox = turf.bbox(feature);
      map.fitBounds([[bbox[0], bbox[1]], [bbox[2], bbox[3]]], { padding:20, duration:1000 });
      map.once('moveend', () => map.easeTo({ pitch:0, bearing:0, zoom: map.getZoom(), duration:1000 }));
      showInfo(props,'Name',false);
      map.setPaintProperty('osm','raster-opacity',0.3);
      // Load regions
      fetch(`data/region_map_data_${props.Name.toLowerCase().replace(/\s+/g,'_')}.geojson`)
        .then(r => r.json())
        .then(rd => {
          regionsData = rd;
          document.getElementById('countrySelect').style.display = 'none';
          const opts = document.getElementById('optionList');
          opts.innerHTML = '';
          // Country button
          const btnC = document.createElement('button');
          btnC.textContent = props.Name;
          btnC.className = 'option-btn';
          btnC.onclick = () => showInfo(props,'Name',false);
          opts.append(btnC);
          // Region buttons
          rd.features.map(f=>f.properties.RegionName).sort().forEach(rn=>{
            const btn = document.createElement('button');
            btn.textContent = rn;
            btn.className = 'option-btn';
            btn.onclick = () => showInfo(rd.features.find(x=>x.properties.RegionName===rn).properties,'RegionName',true);
            opts.append(btn);
          });
          opts.style.display = 'flex';
          const existing = document.getElementById('backBtn'); if (existing) existing.remove();
          document.getElementById('sidebar').insertAdjacentHTML('afterbegin','<button id="backBtn">◀ Back to countries</button>');
          document.getElementById('backBtn').onclick = resetToCountries;
        })
        .catch(() => {
          const existing = document.getElementById('backBtn'); if (existing) existing.remove();
          document.getElementById('sidebar').insertAdjacentHTML('afterbegin','<button id="backBtn">◀ Back to countries</button>');
          document.getElementById('backBtn').onclick = resetToCountries;
        });
    }

    // Initialize map without 3D effect
    function initMap() {
      window.map = new maplibregl.Map({
        container: 'map',
        style: {
          version: 8,
          sources: { osm:{type:'raster',tiles:['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],tileSize:256} },
          layers: [{ id:'osm', type:'raster', source:'osm', paint:{ 'raster-opacity':1 } }]
        },
        center: [5,50], zoom:5, pitch:0, bearing:0, minZoom:5, maxZoom:10
      });

      map.on('load', () => {
        map.addSource('countries',{type:'geojson',data:countriesData});
        map.addLayer({id:'country-fill',type:'fill',source:'countries',paint:{'fill-color':'#003399','fill-opacity':0.4}});
        map.addLayer({id:'country-border',type:'line',source:'countries',paint:{'line-color':'#333','line-width':2}});
        // Populate dropdown
        const sel = document.getElementById('countrySelect'); sel.innerHTML = '';
        countriesData.features.map(f=>f.properties.Name).sort().forEach(n=>sel.add(new Option(n,n)));
        sel.addEventListener('change', function() { const feat = countriesData.features.find(f=>f.properties.Name===this.value); if(feat) handleCountrySelect(feat); });
        map.on('click','country-fill', e => handleCountrySelect(e.features[0]));
        map.on('mouseenter','country-fill',()=>map.getCanvas().style.cursor='pointer');
        map.on('mouseleave','country-fill',()=>map.getCanvas().style.cursor='');
      });
    }

    // Load data and start
    Promise.all([
      fetch('data/map_data.geojson').then(r=>r.json()),
      fetch('text/text_template.json').then(r=>r.json())
    ]).then(([cd,tt])=>{countriesData=cd; textTemplates=tt; initMap(); document.getElementById('loader').remove(); document.body.classList.remove('loading'); toggleIntro(); timer=setTimeout(()=>{const ib=document.getElementById('introBtn'); ib.disabled=false; ib.style.pointerEvents='auto'; ib.style.display='inline-block';},10000);} ).catch(e=>{console.error(e); document.getElementById('loader').textContent='Fout bij laden data.';});
  </script>
</body>
</html>
